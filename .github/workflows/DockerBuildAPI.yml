name: DockerBuildAPI

on:
  push:
    paths:
      # `API/*` only matches direct children of API/, so changes in
      # API/src/... never triggered. `API/**` matches recursively.
      - API/**
    branches:
      - master
      - feat/rollback-on-bad-update-id
    tags:
      - v*
  # Lets you re-run the build from the Actions tab on demand without
  # needing a fresh commit.
  workflow_dispatch:

env:
  IMAGE_NAME: self-hosted-expo-updates-server-api

jobs:
  build:
    runs-on: ubuntu-latest
    # Allow workflow_dispatch alongside push so the Actions tab "Run workflow"
    # button actually runs the build instead of skipping it.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    # Use the built-in GITHUB_TOKEN to push to GHCR instead of a
    # PAT_REPO_WRITE secret the fork owner would otherwise have to provision
    # manually. `packages: write` lets the token push container images;
    # `contents: read` is the standard checkout scope.
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v2

      - name: Build image
        run: docker build ./API --tag $IMAGE_NAME

      - name: Log into registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          IMAGE_ID=ghcr.io/${{ github.actor }}/$IMAGE_NAME

          # Change all uppercase to lowercase
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')

          # Strip git ref prefix from version
          VERSION=$(echo "${{ github.ref }}" | sed -e 's,.*/\(.*\),\1,')

          # Strip "v" prefix from tag name
          [[ "${{ github.ref }}" == "refs/tags/"* ]] && VERSION=$(echo $VERSION | sed -e 's/^v//')

          # Use Docker `latest` tag convention
          [ "$VERSION" == "master" ] && VERSION=latest

          echo IMAGE_ID=$IMAGE_ID
          echo VERSION=$VERSION

          docker tag $IMAGE_NAME $IMAGE_ID:$VERSION
          docker push $IMAGE_ID:$VERSION
